<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScoutSystem 旅團元件市場</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-900 font-sans">
    <div class="max-w-5xl mx-auto py-12 px-4">
        <header class="text-center mb-12">
            <h1 class="text-4xl font-extrabold text-blue-800 mb-2">旅團元件市場 (Router)</h1>
            <p class="text-gray-500">Registry v1.0.0 | 這裡定義了所有可供旅團 Portal 安裝的模組</p>
        </header>

        <div id="market-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- 由 JS 動態填充 -->
        </div>

        <footer class="mt-16 text-center text-gray-400 text-sm">
            <p>ScoutSystem Framework - 轉駁器模式</p>
        </footer>
    </div>

    <script>
        fetch('./registry.json')
            .then(res => res.json())
            .then(data => {
                const grid = document.getElementById('market-grid');
                data.plugins.forEach(p => {
                    const card = `
                        <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 hover:shadow-lg transition-all">
                            <div class="text-4xl mb-4">${p.icon}</div>
                            <h3 class="text-xl font-bold mb-1">${p.title}</h3>
                            <div class="flex items-center gap-2 mb-3">
                                <span class="text-xs px-2 py-0.5 rounded-full ${p.tier === 2 ? 'bg-purple-100 text-purple-700' : 'bg-orange-100 text-orange-700'}">Tier ${p.tier}</span>
                                <span class="text-xs text-gray-400">${p.id}</span>
                            </div>
                            <p class="text-gray-600 text-sm mb-4">${p.description}</p>
                            <code class="block bg-gray-100 p-2 rounded text-[10px] break-all text-gray-500">${p.path}</code>
                        </div>
                    `;
                    grid.innerHTML += card;
                });
            });
    </script>
</body>
</html>
